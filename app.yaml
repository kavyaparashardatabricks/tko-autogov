command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: SERVING_ENDPOINT
    value: databricks-claude-sonnet-4-5

resources:
  - name: database
    database:
      instance_name: finance-governance
      database_name: govdb
      permission: CAN_CONNECT_AND_CREATE
